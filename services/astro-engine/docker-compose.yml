services:
  astro-engine:
    build:
      context: ../..
      dockerfile: services/astro-engine/Dockerfile
    env_file:
      - .env
    environment:
      PORT: "3000"
      ASTRO_V1_API_ENABLED: "true"
      ASTRO_ENGINE_IMPL: "${ASTRO_ENGINE_IMPL:-ts}"
      PYTHON_ASTRO_ENGINE_ENTRYPOINT: "/app/services/astro-engine/python/run_calculation.py"
      SWISS_EPHE_PATH: "/app/ephe"
      ASTRO_ENGINE_PYTHON_TIMEOUT_MS: "${ASTRO_ENGINE_PYTHON_TIMEOUT_MS:-15000}"
    ports:
      - "3000:3000"
    restart: unless-stopped
